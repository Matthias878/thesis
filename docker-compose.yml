services:
  higlass:
    image: higlass/higlass-docker
    container_name: higlass
    volumes:
      - ./Backend/HiGlassFiles:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  bootstrap_ingest:
    image: higlass/higlass-docker
    container_name: bootstrap_ingest
    depends_on:
      higlass:
        condition: service_healthy
    volumes:
      - ./Backend/HiGlassFiles:/data
      - ./Backend/ingest_watcher.sh:/ingest_watcher.sh:ro
    environment:
      DATA_DIR: /data
      STARTUP_DIR: /data/StartupFiles
      COORD_SYSTEM: synthetic_maxchr
      CHROMSIZES_BASENAME: synthetic_maxchr_sizes.tsv
      STARTUP_PICK: finishedfile.mcool
    entrypoint: ["/bin/bash", "/ingest_watcher.sh", "--bootstrap"]
    restart: "no"

  backend:
    build: ./Backend
    #cpus: 0.7 #use at testing
    container_name: backend
    volumes:
      - ./Backend:/app
      - ./Backend/HiGlassFiles:/app/HiGlassFiles
    depends_on:
      higlass:
        condition: service_healthy
      bootstrap_ingest:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  ingest_watcher:
    image: higlass/higlass-docker
    #cpus: 0.7 #use at testing
    container_name: ingest_watcher
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./Backend/HiGlassFiles:/data
      - ./Backend/ingest_watcher.sh:/ingest_watcher.sh:ro
    environment:
      DATA_DIR: /data
      STARTUP_DIR: /data/StartupFiles
      COORD_SYSTEM: synthetic_maxchr
      CHROMSIZES_BASENAME: synthetic_maxchr_sizes.tsv
      STARTUP_PICK: finishedfile.mcool
    entrypoint: ["/bin/bash", "/ingest_watcher.sh", "--watch"]
    restart: unless-stopped


  frontend:
    build:
      context: ./Frontend
      target: prod
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    command: ["sh", "-c", "nginx -g 'daemon off;'"]

  frontend_test:
    profiles: ["test"]
    build:
      context: ./Frontend
      target: test
    container_name: frontend_test
    depends_on:
      frontend:
        condition: service_started
    environment:
      BASE_URL: http://frontend/
      FOLDER_PATH: /tests/test_files
      RESULTS_DIR: /tests/results
      UPLOAD_URL_SUBSTRING: ""
    volumes:
      - ./Frontend/tests/test_files:/tests/test_files
      - ./Frontend/tests/results:/tests/results
    command: ["sh", "-c", "sleep infinity"]